        <div class="interface-wrapper">

            <!--challange canvas, header(prompt)-->
            <div class="challenge-container">
                <div class="challenge">
                    <div class="challenge-view">

                        <!--HEADER -->
                        <div class="challenge-header">
                            <div class="challenge-prompt">
                                <div class="prompt-padding">
                                    <h2 class="prompt-question">
                                        <span style="color: inherit; font-weight: 500; font-size: inherit; line-height: inherit;">
                                            Choose the photo that feels hot
                                        </span>
                                    </h2>
                                </div>
                                
                                <div class="prompt-bg"></div>
                                <div class="examples"></div>
                            </div>
                        </div>

                        <!--PHOTOS-->
                        <div class="task-grid"></div>
                    </div>
                </div>
            
            </div>

            <!--display error, challenge-breadcrumbs, submit button-->
            <div class="interface-challenge">
                <div class="display-error"></div>
                <div class="challenge-breadcrumbs"></div>
                <div class="button-submit button">
                    <div class="text">Пропустить</div>
                </div>
            </div>

                            <circle cx="12.5" cy="12.5" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>

                        </svg>
                    </div>
                </div>

                        </div>

                        <div class="menu-item" tabindex="-1" role="menuitem">

                            <div style="position: absolute; height: 1px; bottom: -4px; left: 10px; right: 10px; background: rgb(245, 245, 245); display: block;"></div>
                        </div>

                        <div class="menu-item" tabindex="-1" role="menuitem">
                            <span>Pizda</span>
                            <div style="position: absolute; height: 1px; bottom: -4px; left: 10px; right: 10px; background: rgb(245, 245, 245); display: block;"></div>
                        </div>

                <a class="captcha-logo"></a>
            </div>
        </div>

        <script>
            const menuInfoButton = document.getElementsByClassName("menu-info")[0];
            const menuInfoButtonOn = document.getElementsByClassName("info-on")[0];
            const menuInfoButtonOff = document.getElementsByClassName("info-off")[0];

            const scrollMenu = document.getElementById("menu");

            let menuInfoIsEnabled = false;

            menuInfoButton.addEventListener("click", () => {
                menuInfoIsEnabled = !menuInfoIsEnabled;

                if (menuInfoIsEnabled) {
                    menuInfoButton.style['background-color'] = 'rgb(245, 245, 245)';

                    menu.setAttribute('tabindex', '0');
                    menu.setAttribute('aria-expanded', 'true');
                    menu.setAttribute('aria-hidden', 'false');
                    
                    menu.style['display'] = 'block'



                    menuInfoButtonOff.style.opacity = 0;
                    menuInfoButtonOn.style.opacity = 1;
                }
                else {
                    menuInfoButton.style['background-color'] = 'rgb(255, 255, 255)';
    
                    menu.setAttribute('tabindex', '-1');
                    menu.setAttribute('aria-expanded', 'false');
                    menu.setAttribute('aria-hidden', 'true');

                    menu.style['display'] = 'none'

                    menuInfoButtonOff.style.opacity = 1;
                    menuInfoButtonOn.style.opacity = 0;
                }
            });

            const refreshButton = document.getElementsByClassName("button-refresh")[0];
            const refreshButtonOn = document.getElementsByClassName("refresh-on")[0];
            const refreshButtonOff = document.getElementsByClassName("refresh-off")[0];

            refreshButton.addEventListener("mouseenter", () => {
                refreshButtonOff.style.opacity = 0;
                refreshButtonOn.style.opacity = 1;
            });

            refreshButton.addEventListener("mouseleave", () => {
                refreshButtonOff.style.opacity = 1;
                refreshButtonOn.style.opacity = 0;
            });


        </script>
    </body>
</html>
