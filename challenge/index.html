<!-- html-validate-disable no-implicit-button-type-->

<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Challenge</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="interface-wrapper">

            <!--challange canvas, header(prompt)-->
            <div class="challenge-container">
                <div class="challenge">
                    <div class="challenge-view">

                        <!--HEADER -->
                        <div class="challenge-header">
                            <div class="challenge-prompt">
                                <div class="prompt-padding">
                                    <h2 class="prompt-question">
                                        <span>
                                            Choose the photo that feels hot
                                        </span>
                                    </h2>
                                </div>
                                
                            </div>
                        </div>

                        <!--PHOTOS-->
                        <div class="task-grid"></div>
                    </div>
                </div>
            
            </div>

            <!--display error, challenge-breadcrumbs, submit button-->
            <div class="interface-challenge">
                <div class="display-error"></div>
                <div class="challenge-breadcrumbs"></div>
                <div class="button-submit button"></div>
            </div>
            
            <!--Lang, menu-info, refresh button, logo, -->
            <div class="interface-user">
                <div class="language-selector"></div>
                <div class="menu-info"></div>
                <div class="button-refresh button"></div>
                <a class="captcha-logo"></a>
            </div>
        </div>
    </body>
</html>
