<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Challenge</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="interface-wrapper">

            <!--challange canvas, header(prompt)-->
            <div class="challenge-container">
                <div class="challenge">
                    <div class="challenge-view">

                        <!--HEADER -->
                        <div class="challenge-header">
                            <div class="challenge-prompt">
                                <div class="prompt-padding">
                                    <h2 class="prompt-question">
                                        <span style="color: inherit; font-weight: 500; font-size: inherit; line-height: inherit;">
                                            Choose the photo that feels hot
                                        </span>
                                    </h2>
                                </div>
                                
                                <div class="prompt-bg"></div>
                                <div class="examples"></div>
                            </div>
                        </div>

                        <!--PHOTOS-->
                        <div class="task-grid"></div>
                    </div>
                </div>
            
            </div>

            <!--display error, challenge-breadcrumbs, submit button-->
            <div class="interface-challenge">
                <div class="display-error"></div>
                <div class="challenge-breadcrumbs"></div>
                <div class="button-submit button">
                    <div class="text">Пропустить</div>
                </div>
            </div>
            
            <!--Lang, menu-info, refresh button, logo, -->
            <div class="interface-user">
                <div class="language-selector"></div>
                <div class="menu-info">
                    <div class="info-off">
                        <svg width="25" height="25" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                            <circle cx="12.5" cy="21.6" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>
                            <circle cx="12.5" cy="12.5" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>
                            <circle cx="12.5" cy="3.40002" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>
                        </svg>
                    </div>
                    <div class="info-on">
                        <svg width="25" height="25" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block;">
                            <circle cx="12.5" cy="21.6" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>
                            <circle cx="12.5" cy="12.5" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>
                            <circle cx="12.5" cy="3.40002" r="2" fill="#787878" style="fill: rgb(85, 85, 85);"></circle>
                        </svg>
                    </div>
                </div>
                <div class="button-refresh button"></div>
                <a class="captcha-logo"></a>
            </div>
        </div>
    </body>
</html>
